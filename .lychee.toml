# Lychee link checker configuration
# https://lychee.cli.rs/usage/config/

# Accept 403 responses (some sites like Medium block bots)
accept = [200, 403]

# Skip external link checking in pre-commit (too slow, network dependent)
# Uncomment to check only local links:
# skip_missing = true
# exclude = ["https://.*", "http://.*"]
